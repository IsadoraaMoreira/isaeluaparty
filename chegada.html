<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎀 Você chegou! — Isa & Luana 18 anos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f9c6d0;
    --pink-deep: #e8899a;
    --pink-light: #fdf0f3;
    --pink-mid: #f4b8c6;
    --dark: #2d1f24;
    --text: #4a3038;
    --white: #fffafc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #ecdde1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── WALLPAPER PATTERN ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle, rgba(232,137,154,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
  }

  /* ═══════════════════
     SELECTION SCREEN
  ═══════════════════ */
  #selection-screen {
    position: fixed; inset: 0; z-index: 50;
    background: linear-gradient(160deg, #fdf0f3 0%, #f9e4ea 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #selection-screen.hide {
    opacity: 0; transform: translateY(-20px); pointer-events: none;
  }

  .sel-card {
    background: rgba(255,250,252,0.95);
    border: 1px solid rgba(249,198,208,0.7);
    border-radius: 28px;
    padding: 44px 36px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 48px rgba(232,137,154,0.18);
    animation: floatUp 0.7s cubic-bezier(.22,1,.36,1);
  }

  @keyframes floatUp {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .sel-icon { font-size: 3rem; margin-bottom: 6px; display: block; }

  .sel-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  .sel-sub {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--pink-deep);
    font-weight: 600;
    margin-bottom: 10px;
    display: block;
  }

  .sel-desc {
    font-size: 0.88rem;
    color: #9e7680;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .who-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    border-radius: 16px;
    border: 1.5px solid var(--pink-mid);
    background: #fff;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 10px;
    transition: all 0.22s ease;
    text-align: left;
  }
  .who-btn:hover {
    border-color: var(--pink-deep);
    background: #fff0f4;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,137,154,0.18);
  }
  .who-btn:last-child { margin-bottom: 0; }
  .who-icon { font-size: 1.6rem; flex-shrink: 0; }
  .who-label { font-size: 0.95rem; font-weight: 600; color: var(--dark); }
  .who-hint  { font-size: 0.75rem; color: #b08a94; }

  /* ── PASSWORD OVERLAY ── */
  #pwd-overlay {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(45,31,36,0.45);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  #pwd-overlay.show { display: flex; }

  .pwd-card {
    background: rgba(255,250,252,0.98);
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 60px rgba(45,31,36,0.25);
    animation: floatUp 0.4s cubic-bezier(.22,1,.36,1);
  }
  .pwd-icon { font-size: 2.4rem; margin-bottom: 8px; display: block; }
  .pwd-title { font-size: 1.25rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .pwd-sub   { font-size: 0.82rem; color: #9e7680; margin-bottom: 24px; line-height: 1.5; }

  .pwd-input {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid var(--pink-mid);
    border-radius: 14px;
    background: var(--pink-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--dark);
    outline: none;
    text-align: center;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .pwd-input:focus { border-color: var(--pink-deep); background: #fff; }

  .pwd-error {
    background: #ffeef1;
    border: 1px solid #f9b8c3;
    color: #c0455a;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.82rem;
    margin-bottom: 12px;
    display: none;
  }
  .pwd-error.show { display: block; }

  .btn-confirm {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--pink-deep), #d4637a);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(232,137,154,0.4);
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,137,154,0.5); }

  .btn-cancel {
    background: none; border: none;
    color: #b08a94; font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; cursor: pointer; padding: 6px;
    transition: color 0.2s;
  }
  .btn-cancel:hover { color: var(--pink-deep); }

  /* ═══════════════════
     CHAT SCREEN
  ═══════════════════ */
  #chat-screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    position: relative; z-index: 1;
    animation: floatUp 0.5s ease;
  }
  #chat-screen.show { display: flex; }

  .chat-header {
    background: linear-gradient(135deg, #e8899a, #d4637a);
    padding: 14px 20px 14px 16px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 16px rgba(45,31,36,0.15);
  }

  .chat-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    border: 2px solid rgba(255,255,255,0.4);
    flex-shrink: 0;
  }

  .chat-info { flex: 1; }
  .chat-name   { font-weight: 600; font-size: 1rem; color: #fff; }
  .chat-status { font-size: 0.72rem; color: rgba(255,255,255,0.85); margin-top: 1px; }

  .chat-dots {
    display: flex; gap: 4px; align-items: center;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.6);
    animation: pulse 1.4s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1);opacity:1} }

  .chat-body {
    flex: 1;
    padding: 20px 16px 32px;
    display: flex; flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }

  /* date pill */
  .date-pill {
    align-self: center;
    background: rgba(232,137,154,0.2);
    color: #9e7680;
    font-size: 0.72rem;
    padding: 4px 14px;
    border-radius: 20px;
    margin: 8px 0;
  }

  /* bubbles */
  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    font-size: 0.92rem;
    line-height: 1.55;
    border-radius: 18px;
    position: relative;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .bubble.visible { opacity: 1; transform: translateY(0); }

  .bubble.received {
    background: #fff;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    color: var(--dark);
  }
  .bubble.sent {
    background: linear-gradient(135deg, #fad4dc, #f5b8c8);
    border-bottom-right-radius: 4px;
    align-self: flex-end;
    color: var(--dark);
  }

  .bubble .meta {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 4px;
    margin-top: 4px;
    font-size: 0.67rem;
    opacity: 0.55;
  }
  .bubble .ticks { letter-spacing: -2px; font-size: 0.75rem; color: #5b9bd5; }

  .emoji-big { font-size: 2.2rem; display: block; margin-bottom: 2px; }

  /* typing indicator */
  .typing-bubble {
    background: #fff;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    padding: 12px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: none;
    gap: 5px;
    align-items: center;
  }
  .typing-bubble.show { display: flex; }
  .typing-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--pink-mid);
    animation: typingBounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--pink-mid); border-radius: 10px; }

  /* ── PETALS ── */
  .petal {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    z-index: 0;
    animation: petalFall linear infinite;
  }
  @keyframes petalFall {
    0%   { opacity: 0; transform: translateY(-10px) rotate(0deg); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(100vh) rotate(380deg); }
  }
</style>
</head>
<body>

<div id="petals-bg"></div>

<!-- ══════════════════════════════════
     SELECTION — quem me convidou?
══════════════════════════════════ -->
<div id="selection-screen">
  <div class="sel-card">
    <span class="sel-icon">🎊</span>
    <h1 class="sel-title">Você chegou!</h1>
    <span class="sel-sub">Isa & Luana · 18 anos</span>
    <p class="sel-desc">Que alegria ter você aqui! 🌸<br>Nos conta quem te convidou pra festa:</p>

    <button class="who-btn" onclick="abrirSenha('luana')">
      <span class="who-icon">💗</span>
      <div>
        <div class="who-label">Fui convidado(a) pela Luana</div>
        <div class="who-hint">Confirme com a senha da Lu</div>
      </div>
    </button>

    <button class="who-btn" onclick="abrirSenha('isadora')">
      <span class="who-icon">🌸</span>
      <div>
        <div class="who-label">Fui convidado(a) pela Isadora</div>
        <div class="who-hint">Confirme com a senha da Isa</div>
      </div>
    </button>

    <button class="who-btn" onclick="abrirSenha('ambas')">
      <span class="who-icon">💕</span>
      <div>
        <div class="who-label">Das duas!</div>
        <div class="who-hint">Confirmação especial</div>
      </div>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════
     PASSWORD OVERLAY
══════════════════════════════════ -->
<div id="pwd-overlay">
  <div class="pwd-card">
    <span class="pwd-icon" id="pwd-icon">💗</span>
    <div class="pwd-title" id="pwd-title">Confirmar chegada</div>
    <p class="pwd-sub" id="pwd-sub">Digite a senha para entrar</p>
    <input type="password" class="pwd-input" id="pwd-input" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')confirmar()">
    <div class="pwd-error" id="pwd-error">Senha incorreta, tente de novo 💕</div>
    <button class="btn-confirm" onclick="confirmar()">Confirmar ✨</button>
    <button class="btn-cancel" onclick="fecharSenha()">Voltar</button>
  </div>
</div>

<!-- ══════════════════════════════════
     CHAT SCREEN
══════════════════════════════════ -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-avatar" id="chat-avatar">🌸</div>
    <div class="chat-info">
      <div class="chat-name" id="chat-name">Isa & Luana 🎀</div>
      <div class="chat-status" id="chat-status">online agora</div>
    </div>
    <div class="chat-dots" id="chat-dots" style="display:none;">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="chat-body" id="chat-body">
    <div class="date-pill" id="date-pill"></div>
    <div class="typing-bubble" id="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════
// CONFIG
// ═══════════════════════════════
const whoConfig = {
  luana:   { icon:'💗', name:'Luana',      pwd:'31072008',    color:'#e8899a' },
  isadora: { icon:'🌸', name:'Isadora',    pwd:'28062008',    color:'#c47a8a' },
  ambas:   { icon:'💕', name:'Isa & Luana',pwd:'283106072008',color:'#d4637a' }
};

const chatMessages = {
  luana: [
    { from:'received', text:'Oi amor!! 🥹💗', delay:600 },
    { from:'received', text:'<span class="emoji-big">🎉</span>O portão está aberto, só entrar!!', delay:1400 },
    { from:'sent',     text:'Chegando já!! 🏃‍♀️', delay:2400 },
    { from:'received', text:'Corre que a festa tá começando 💃🎀', delay:3300 },
    { from:'received', text:'Te esperando aqui!! ✨🌸', delay:4100 },
  ],
  isadora: [
    { from:'received', text:'Eiii!! Que bom que você veio 🌸🥰', delay:600 },
    { from:'received', text:'<span class="emoji-big">🚪✨</span>O portão tá aberto!! Pode entrar!', delay:1400 },
    { from:'sent',     text:'Já estou chegando!! 🎊', delay:2400 },
    { from:'received', text:'Yaaay! Que alegria 💕🎊', delay:3300 },
    { from:'received', text:'A festa já tá arrasando igual você 😍🎀', delay:4100 },
  ],
  ambas: [
    { from:'received', text:'CHEGOUUU!! 🎉🎉', delay:600 },
    { from:'received', text:'<span class="emoji-big">💕🎊</span>Porta aberta pra você!!', delay:1400 },
    { from:'sent',     text:'Cheguei!! Que festa!! 🥳', delay:2400 },
    { from:'received', text:'A Isa e a Luana estão esperando você!! 🌸💗', delay:3300 },
    { from:'received', text:'Bora celebrar juntos!! ✨🎂', delay:4100 },
  ]
};

// ═══════════════════════════════
// STATE
// ═══════════════════════════════
let currentWho = '';

// ═══════════════════════════════
// PASSWORD FLOW
// ═══════════════════════════════
function abrirSenha(who) {
  currentWho = who;
  const cfg = whoConfig[who];
  document.getElementById('pwd-icon').textContent  = cfg.icon;
  document.getElementById('pwd-title').textContent = `Convidado(a) por ${cfg.name}`;
  document.getElementById('pwd-sub').textContent   = `Digite a senha secreta da ${cfg.name} para confirmar sua chegada 🎀`;
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error').classList.remove('show');
  document.getElementById('pwd-overlay').classList.add('show');
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}

function fecharSenha() {
  document.getElementById('pwd-overlay').classList.remove('show');
}

function confirmar() {
  const pwd = document.getElementById('pwd-input').value;
  const cfg = whoConfig[currentWho];
  if (pwd === cfg.pwd) {
    fecharSenha();
    enviarEmail(cfg.name);
    iniciarChat(currentWho);
  } else {
    document.getElementById('pwd-error').classList.add('show');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

// ═══════════════════════════════
// EMAIL NOTIFICATION
// ═══════════════════════════════
function enviarEmail(nome) {
  // 🔧 Configure EmailJS aqui com seus IDs reais
  // emailjs.send('SERVICE_ID','TEMPLATE_ID',{ convidado_por: nome, horario: new Date().toLocaleString('pt-BR') });
  const subject = encodeURIComponent(`🎉 Chegou! Convidado(a) por ${nome} — Festa Isa & Luana`);
  const body    = encodeURIComponent(`Um convidado acabou de chegar!\n\nConvidado(a) por: ${nome}\nHorário: ${new Date().toLocaleString('pt-BR')}`);
  // Descomente para abrir cliente de email:
  // window.open(`mailto:seuemail@gmail.com,isadora@gmail.com?subject=${subject}&body=${body}`);
  console.log(`📧 Confirmar chegada — por: ${nome} às ${new Date().toLocaleString('pt-BR')}`);
}

// ═══════════════════════════════
// CHAT
// ═══════════════════════════════
function iniciarChat(who) {
  const cfg = whoConfig[who];

  // Hide selection, show chat
  document.getElementById('selection-screen').classList.add('hide');
  const chatScreen = document.getElementById('chat-screen');
  chatScreen.classList.add('show');

  // Set header
  document.getElementById('chat-avatar').textContent = cfg.icon;
  document.getElementById('chat-name').textContent =
    who === 'ambas' ? 'Isa & Luana 🎀' : `${cfg.name} 🎀`;

  // Date pill
  const now = new Date();
  document.getElementById('date-pill').textContent =
    now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});

  const body   = document.getElementById('chat-body');
  const typing = document.getElementById('typing-indicator');
  const msgs   = chatMessages[who];

  // Show typing first
  setTimeout(() => {
    typing.classList.add('show');
    body.scrollTop = body.scrollHeight;
  }, 300);

  msgs.forEach((msg, i) => {
    setTimeout(() => {
      // hide typing before received msgs
      if (msg.from === 'received') {
        typing.classList.remove('show');
      }

      const bubble = document.createElement('div');
      bubble.className = `bubble ${msg.from}`;
      const time = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      bubble.innerHTML = `
        ${msg.text}
        <div class="meta">
          <span>${time}</span>
          ${msg.from === 'sent' ? '<span class="ticks">✓✓</span>' : ''}
        </div>`;

      // Insert before typing indicator
      body.insertBefore(bubble, typing);
      requestAnimationFrame(() => bubble.classList.add('visible'));
      body.scrollTop = body.scrollHeight;

      // Show typing again before next received msg
      if (i < msgs.length - 1 && msgs[i+1].from === 'received') {
        setTimeout(() => {
          typing.classList.add('show');
          body.scrollTop = body.scrollHeight;
        }, 200);
      }
    }, msg.delay);
  });
}

// ═══════════════════════════════
// PETALS
// ═══════════════════════════════
const petals = ['🌸','💗','✨','🌷','💕','🎀'];
function createPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petals[Math.floor(Math.random()*petals.length)];
  p.style.left = Math.random()*100+'vw';
  p.style.fontSize = (0.6+Math.random()*0.7)+'rem';
  p.style.animationDuration = (7+Math.random()*9)+'s';
  p.style.animationDelay = (Math.random()*3)+'s';
  document.getElementById('petals-bg').appendChild(p);
  setTimeout(()=>p.remove(), 16000);
}
setInterval(createPetal, 2500);
createPetal(); createPetal();
</script>
</body>
</html>
